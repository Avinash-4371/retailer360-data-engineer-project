    enabled: false
    file_type: csv
    file_pattern: returns_*.csv
    source_path: gs://retailer_landing_data/returns/
    raw_path: gs://retailer_data/raw/returns
    archive_path: gs://retailer_data/archive/returns
    duplicate_files_path: gs://retailer_data/duplicate/returns
    rejected_path: gs://retailer_data/rejected/returns
    target_table: retailer-data-engineer.raw_local.flatfile_returns
    audit_table : retailer-data-engineer.raw_local.audit_files
    primary_key: return_id
    load_type: incremental
    partition_column: return_date

